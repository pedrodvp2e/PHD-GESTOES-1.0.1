name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Generate app icon (PHD Gestões)
        run: npx capacitor-assets generate --android

      - name: Configure notification permission and icon
        run: |
          # Permissão de notificações (obrigatória a partir do Android 13)
          sed -i 's#</manifest>#    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.USE_BIOMETRIC" />\n    <uses-permission android:name="android.permission.USE_FINGERPRINT" />\n</manifest>#' android/app/src/main/AndroidManifest.xml
          # Ícone da PHD Gestões usado na barra de notificações
          mkdir -p android/app/src/main/res/drawable
          cp public/assets/images/icon.png android/app/src/main/res/drawable/ic_stat_notify.png

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore.jks

          cat > patch-gradle.cjs <<'EOF'
          const fs = require('fs');
          const path = 'android/app/build.gradle';
          let content = fs.readFileSync(path, 'utf8');

          const signingBlock = `
              signingConfigs {
                  release {
                      storeFile file('release.keystore.jks')
                      storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')
                      keyAlias System.getenv('ANDROID_KEY_ALIAS')
                      keyPassword System.getenv('ANDROID_KEY_PASSWORD')
                  }
              }
          `;

          content = content.replace('android {', 'android {' + signingBlock);
          content = content.replace(
            /(release\s*\{\s*\n)(\s*)minifyEnabled/,
            (match, p1, p2) => `${p1}${p2}signingConfig signingConfigs.release\n${p2}minifyEnabled`
          );

          fs.writeFileSync(path, content);
          console.log('build.gradle configurado com a assinatura de release.');
          EOF

          node patch-gradle.cjs

      - name: Build APK assinado (release)
        working-directory: ./android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK assinado
        uses: actions/upload-artifact@v4
        with:
          name: app-release-assinado
          path: android/app/build/outputs/apk/release/app-release.apk
